version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gapak-postgres
    environment:
      POSTGRES_DB: gapak
      POSTGRES_USER: gapak
      POSTGRES_PASSWORD: gapak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gapak -d gapak"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gapak-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2026-03-13T16-41-08Z
    container_name: gapak-minio
    environment:
      MINIO_ROOT_USER: gapak
      MINIO_ROOT_PASSWORD: gapak-secret
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2026-03-14T01-46-16Z
    container_name: gapak-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set gapak http://minio:9000 gapak gapak-secret &&
      mc mb --ignore-existing gapak/gapak-private &&
      mc anonymous set private gapak/gapak-private
      "
    restart: "no"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gapak-migrate
    command: ["gapak-migrate"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gapak:gapak@postgres:5432/gapak?sslmode=disable
      MIGRATIONS_DIR: db/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gapak-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gapak:gapak@postgres:5432/gapak?sslmode=disable
      REDIS_URL: redis://redis:6379/5
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY_ID: gapak
      STORAGE_SECRET_ACCESS_KEY: gapak-secret
      STORAGE_BUCKET: gapak-private
      STORAGE_SIGNING_SECRET: change-me-storage-signing-secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gapak-worker
    command: ["gapak-worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gapak:gapak@postgres:5432/gapak?sslmode=disable
      REDIS_URL: redis://redis:6379/5
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY_ID: gapak
      STORAGE_SECRET_ACCESS_KEY: gapak-secret
      STORAGE_BUCKET: gapak-private
      STORAGE_SIGNING_SECRET: change-me-storage-signing-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
